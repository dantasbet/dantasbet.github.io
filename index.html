<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Jogos - API-Football</title>

</head>
<body>

  <section id="analise" style="display: none;">

  </section>
