<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise Esportiva</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Análise Esportiva</h1>
    </header>

    <div id="ligas-container">
        <h2>Escolha uma Liga</h2>
        <select id="liga-select">
            <option value="">Selecione uma Liga</option>
        </select>
    </div>

    <div id="jogos-container" style="display: none;">
        <h2>Escolha um Jogo</h2>
        <select id="jogo-select">
            <option value="">Selecione um Jogo</option>
        </select>
    </div>

    <div id="analise-container" style="display: none;">
        <h2>Análise do Jogo</h2>
        <div id="resultados"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
