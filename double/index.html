<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="../index.html">
            <img src="../img/dantasdabet.png" alt="logo" class="ilogo"></a>
        <h1 class="tit-double">Double</h1>
    </header>

    <hr class="separador">

    <main>
        <div class="jogo">
            <h1 class="sec-tit-double">Double: Par ou Impar</h1>
            <div class="pi">
                <button onclick="escolherPar()" class="par">Par</button>
                <button onclick="escolherImpar()" class="impar">Impar</button>
            </div>
            <p id="resultado" class="resultado"></p>
        </div>

        <div class="relatorio">
            <h1 class="tit-relatorio">Historico</h1>
            <div class="paragrafos">
                <p class="parav">Vitorias: <span id="vitorias">0</span></p>
                <div class="linha-vertical"></div>
                <p class="parad">derrotas: <span id="derrotas">0</span></p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
