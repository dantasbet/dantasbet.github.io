<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="../index.html">
            <img src="../img/dantasdabet.png" alt="logo" class="ilogo"></a>
        <h1 class="tit-double">Double</h1>
    </header>

    <hr class="separador">

    <main>
        <div class="jogo">
            <h1 class="sec-tit-double">Double: Vermelho ou Preto</h1>
            <div class="pi">
                <button onclick="escolherPreto()" class="preto">Preto</button>
                <button onclick="escolherVermelho()" class="vermelho">Vermelho</button>
            </div>
            <p id="resultado" class="resultado"></p>
        </div>

        <div class="relatorio">
            <h1 class="tit-relatorio">Histórico</h1>
            <div class="paragrafos">
                <p class="parav">Vitórias: <span id="vitorias">0</span></p>
                <div class="linha-vertical"></div>
                <p class="parad">Derrotas: <span id="derrotas">0</span></p>
            </div>
            <!-- Adiciona a seção de histórico aqui -->
            <div id="historico" class="historico">
                <hr class="separador2">
                <h2 class="tit-histo">Últimos Números:</h2>
                <ul id="historico-lista"></ul>
            </div>
        </div>
        
    </main>

    <script src="script.js"></script>
</body>
</html>
